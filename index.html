<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Store — Online Shop</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0 } to { transform: translateX(0); opacity:1 } }
  .toast { animation: slideIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform: translateY(0) } }
  .fade { animation: fadeIn .2s ease; }
  @keyframes spin { to { transform: rotate(360deg) } }
  .spinner { animation: spin .7s linear infinite; }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, createContext, useContext, useMemo, useCallback } = React;

/* ============================================================
   API CONFIG  — change this to your deployed API URL
   ============================================================ */
const API_BASE = localStorage.getItem("ns_api_base") || "https://novastore-fk1k.onrender.com/api";

const money = (n) => "$" + Number(n).toFixed(2);

/* fetch wrapper — attaches JWT, parses JSON, throws on error */
async function api(path, { method="GET", body, token } = {}) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers.Authorization = "Bearer " + token;
  let res;
  try {
    res = await fetch(API_BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  } catch (e) {
    throw new Error("Cannot reach the API server. Is it running at " + API_BASE + " ?");
  }
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data.error || ("Request failed ("+res.status+")"));
  return data;
}

/* ---------------- validation helpers ---------------- */
const V = {
  required: (v) => (v && String(v).trim()) ? "" : "This field is required",
  email: (v) => !v ? "Email is required" : (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? "" : "Enter a valid email"),
  min: (n) => (v) => (v && v.length >= n) ? "" : `Must be at least ${n} characters`,
  phone: (v) => !v ? "" : (/^[0-9+\-\s()]{7,}$/.test(v) ? "" : "Enter a valid phone number"),
  zip: (v) => !v ? "" : (/^[0-9A-Za-z\s\-]{3,10}$/.test(v) ? "" : "Enter a valid ZIP/postal code"),
  match: (other) => (v) => v === other ? "" : "Passwords do not match",
};
const luhnValid = (num) => { const s=num.replace(/\s|-/g,""); if(!/^\d{12,19}$/.test(s)) return false; let sum=0,alt=false; for(let i=s.length-1;i>=0;i--){ let d=parseInt(s[i],10); if(alt){d*=2; if(d>9)d-=9;} sum+=d; alt=!alt; } return sum%10===0; };
const cardBrand = (num) => { const s=num.replace(/\s|-/g,""); if(/^4/.test(s))return"Visa"; if(/^5[1-5]/.test(s)||/^2[2-7]/.test(s))return"Mastercard"; if(/^3[47]/.test(s))return"Amex"; if(/^6(?:011|5)/.test(s))return"Discover"; return""; };
const validateCard = (card) => {
  const errs={}; const digits=card.number.replace(/\s/g,"");
  if(!digits) errs.number="Card number is required";
  else if(!/^\d+$/.test(digits)) errs.number="Digits only";
  else if(!luhnValid(digits)) errs.number="Invalid card number (failed checksum)";
  if(!card.name.trim()) errs.name="Name on card is required";
  if(!/^\d{2}\/\d{2}$/.test(card.expiry)) errs.expiry="Use MM/YY format";
  else { const [mm,yy]=card.expiry.split("/").map(Number); if(mm<1||mm>12) errs.expiry="Invalid month"; else { const exp=new Date(2000+yy,mm); if(exp<=new Date()) errs.expiry="Card has expired"; } }
  const brand=cardBrand(digits); const cvcLen=brand==="Amex"?4:3;
  if(!new RegExp(`^\\d{${cvcLen}}$`).test(card.cvc)) errs.cvc=`CVC must be ${cvcLen} digits`;
  return errs;
};
const formatCardNumber = (v) => v.replace(/\D/g,"").slice(0,19).replace(/(\d{4})(?=\d)/g,"$1 ").trim();
const formatExpiry = (v) => { const s=v.replace(/\D/g,"").slice(0,4); return s.length>2 ? s.slice(0,2)+"/"+s.slice(2) : s; };
const TEST_CARDS = [
  { brand:"Visa", number:"4242 4242 4242 4242", cvc:"123", exp:"12/28" },
  { brand:"Mastercard", number:"5555 5555 5555 4444", cvc:"123", exp:"12/28" },
  { brand:"Amex", number:"3782 822463 10005", cvc:"1234", exp:"12/28" },
  { brand:"Discover", number:"6011 1111 1111 1117", cvc:"123", exp:"12/28" },
];

function Field({ label, value, onChange, error, type="text", placeholder, testId, ...rest }) {
  return (
    <div>
      {label && <label className="block text-xs font-medium text-slate-600 mb-1">{label}</label>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} data-testid={testId}
        className={"w-full border rounded px-3 py-2 text-sm outline-none focus:ring-2 "+(error?"border-rose-400 focus:ring-rose-200":"focus:ring-indigo-200")} {...rest}/>
      {error && <p data-testid={testId?testId+"-error":undefined} className="text-rose-500 text-xs mt-1">{error}</p>}
    </div>
  );
}
function Spinner({ label="Loading…" }) {
  return <div data-testid="loading-spinner" className="flex items-center justify-center gap-3 py-16 text-slate-400"><span className="spinner inline-block w-5 h-5 border-2 border-slate-300 border-t-indigo-500 rounded-full"></span>{label}</div>;
}
function ErrorBox({ msg, onRetry }) {
  return <div data-testid="error-box" className="max-w-lg mx-auto my-8 bg-rose-50 border border-rose-200 rounded-xl p-5 text-center"><p data-testid="error-message" className="text-rose-700 text-sm">{msg}</p>{onRetry && <button data-testid="error-retry" onClick={onRetry} className="mt-3 bg-rose-600 text-white text-sm px-4 py-2 rounded-lg">Retry</button>}</div>;
}
function Stars({ value, size="text-sm" }) { const full=Math.round(value); return <span className={"text-amber-400 "+size}>{"★".repeat(full)}<span className="text-slate-300">{"★".repeat(5-full)}</span></span>; }

/* ============================================================
   STORE — client state + API calls
   ============================================================ */
const Store = createContext();
function StoreProvider({ children }) {
  const [token, setToken] = useState(() => localStorage.getItem("ns_token") || null);
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(localStorage.getItem("ns_user")); } catch { return null; } });
  const [cart, setCart] = useState(() => { try { return JSON.parse(localStorage.getItem("ns_cart_api")) || []; } catch { return []; } });
  const [wishlist, setWishlist] = useState(() => { try { return JSON.parse(localStorage.getItem("ns_wish_api")) || []; } catch { return []; } });
  const [toasts, setToasts] = useState([]);

  useEffect(() => { token ? localStorage.setItem("ns_token", token) : localStorage.removeItem("ns_token"); }, [token]);
  useEffect(() => { currentUser ? localStorage.setItem("ns_user", JSON.stringify(currentUser)) : localStorage.removeItem("ns_user"); }, [currentUser]);
  useEffect(() => localStorage.setItem("ns_cart_api", JSON.stringify(cart)), [cart]);
  useEffect(() => localStorage.setItem("ns_wish_api", JSON.stringify(wishlist)), [wishlist]);

  const toast = (msg) => { const id=Date.now()+Math.random(); setToasts(t=>[...t,{id,msg}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2500); };
  const addToCart = (p, qty=1) => { setCart(prev=>{ const ex=prev.find(i=>i.id===p.id); if(ex) return prev.map(i=>i.id===p.id?{...i,qty:i.qty+qty}:i); return [...prev,{id:p.id,name:p.name,price:p.price,image:p.image,qty}]; }); toast(p.name+" added to cart"); };
  const toggleWish = (p) => setWishlist(prev=>prev.includes(p.id)?prev.filter(x=>x!==p.id):[...prev,p.id]);

  const login = async (email, password, wantRole) => {
    const { user, token } = await api("/auth/login", { method:"POST", body:{ email, password } });
    if (wantRole==="admin" && user.role!=="admin") throw new Error("This account does not have admin access");
    setToken(token); setCurrentUser(user); return user;
  };
  const register = async (name, email, password) => {
    const { user, token } = await api("/auth/register", { method:"POST", body:{ name, email, password } });
    setToken(token); setCurrentUser(user); return user;
  };
  const logout = () => { setToken(null); setCurrentUser(null); };

  const value = { token, currentUser, cart, setCart, wishlist, toggleWish, toast, toasts, addToCart, login, register, logout };
  return <Store.Provider value={value}>{children}</Store.Provider>;
}

function Toasts() { const { toasts } = useContext(Store); return <div data-testid="toast-container" className="fixed bottom-5 right-5 z-50 space-y-2">{toasts.map(t=>(<div key={t.id} data-testid="toast" className="toast bg-slate-900 text-white px-4 py-2.5 rounded-lg shadow-lg text-sm flex items-center gap-2"><span>✓</span>{t.msg}</div>))}</div>; }

/* ---------------- nav ---------------- */
function Nav({ page, go, query, setQuery }) {
  const { cart, wishlist, currentUser, logout } = useContext(Store);
  const count = cart.reduce((s,i)=>s+i.qty,0);
  return (
    <header className="bg-white border-b sticky top-0 z-40">
      <div className="bg-indigo-700 text-white text-center text-xs py-1.5">🚚 Free shipping over $75 · Use code <b>SAVE10</b> for 10% off</div>
      <div className="max-w-6xl mx-auto px-4 h-16 flex items-center gap-4">
        <button data-testid="nav-logo" onClick={()=>go("shop")} className="flex items-center gap-2 shrink-0"><span className="text-2xl">🛍️</span><span className="text-xl font-bold text-indigo-700 hidden sm:inline">Nova Store</span></button>
        <div className="flex-1 max-w-md"><input data-testid="nav-search" value={query} onChange={e=>{setQuery(e.target.value); go("shop");}} placeholder="Search products…" className="w-full border rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-300 outline-none" /></div>
        <nav className="flex items-center gap-4 text-sm font-medium text-slate-600 shrink-0">
          <button data-testid="nav-wishlist" onClick={()=>go("wishlist")} className="relative hidden sm:block">♡<span className="hidden md:inline"> Wishlist</span>{wishlist.length>0 && <span data-testid="wishlist-count" className="absolute -top-2 -right-3 bg-rose-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">{wishlist.length}</span>}</button>
          <button data-testid="nav-cart" onClick={()=>go("cart")} className="relative">🛒<span className="hidden md:inline"> Cart</span>{count>0 && <span data-testid="cart-count" className="absolute -top-2 -right-3 bg-indigo-600 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">{count}</span>}</button>
          {currentUser ? (
            <div className="flex items-center gap-2">
              {currentUser.role==="admin" && <button data-testid="nav-admin" onClick={()=>go("admin")} className={"px-3 py-1.5 rounded-lg bg-slate-800 text-white "+(page==="admin"?"ring-2 ring-indigo-400":"")}>Admin</button>}
              <button data-testid="nav-account" onClick={()=>go("account")} className="hidden sm:inline text-slate-700">Hi, {currentUser.name.split(" ")[0]}</button>
              <button data-testid="nav-logout" onClick={logout} className="text-slate-400 hover:text-rose-500">Logout</button>
            </div>
          ) : (<button data-testid="nav-signin" onClick={()=>go("auth")} className="px-3 py-1.5 rounded-lg bg-indigo-600 text-white">Sign in</button>)}
        </nav>
      </div>
    </header>
  );
}

/* ---------------- auth ---------------- */
function AuthPage({ go }) {
  const { login, register, toast } = useContext(Store);
  const [role, setRole] = useState("user");
  const [mode, setMode] = useState("login");
  const [f, setF] = useState({ name:"", email:"", password:"", confirm:"" });
  const [errs, setErrs] = useState({});
  const [busy, setBusy] = useState(false);
  const set = (k,v)=>{ setF({...f,[k]:v}); setErrs(e=>({...e,[k]:undefined})); };
  const validate = () => {
    const e = {};
    if (mode==="register") { e.name=V.required(f.name); e.confirm=V.match(f.password)(f.confirm); }
    e.email=V.email(f.email); e.password=V.min(6)(f.password);
    Object.keys(e).forEach(k=>{ if(!e[k]) delete e[k]; }); setErrs(e); return Object.keys(e).length===0;
  };
  const submit = async () => {
    if (!validate()) return;
    setBusy(true);
    try {
      if (mode==="register") { await register(f.name, f.email, f.password); toast("Welcome, "+f.name+"!"); go("shop"); }
      else { const u = await login(f.email, f.password, role); toast("Signed in"); go(u.role==="admin"?"admin":"shop"); }
    } catch (err) { setErrs({ password: err.message }); }
    finally { setBusy(false); }
  };
  return (
    <div className="max-w-md mx-auto px-4 py-12 fade">
      <div className="bg-white border rounded-2xl p-6 shadow-sm">
        <div className="flex bg-slate-100 rounded-lg p-1 mb-5 text-sm">
          {[["user","👤 Customer"],["admin","🛡️ Admin"]].map(([r,l])=>(<button key={r} data-testid={"auth-role-"+r} onClick={()=>{setRole(r); setMode("login"); setErrs({});}} className={"flex-1 py-2 rounded-md "+(role===r?"bg-white shadow font-medium":"text-slate-500")}>{l}</button>))}
        </div>
        <h2 className="text-xl font-bold">{mode==="login" ? (role==="admin"?"Admin sign in":"Sign in to your account") : "Create your account"}</h2>
        <p className="text-sm text-slate-500 mt-1 mb-4">{role==="admin" ? "Restricted to store administrators." : (mode==="login"?"Welcome back!":"Join Nova Store in seconds.")}</p>
        <div className="space-y-3">
          {mode==="register" && role==="user" && <Field testId="auth-name" label="Full name" value={f.name} onChange={e=>set("name",e.target.value)} error={errs.name} placeholder="Jane Doe"/>}
          <Field testId="auth-email" label="Email" value={f.email} onChange={e=>set("email",e.target.value)} error={errs.email} placeholder="you@example.com"/>
          <Field testId="auth-password" label="Password" type="password" value={f.password} onChange={e=>set("password",e.target.value)} error={errs.password} placeholder="At least 6 characters"/>
          {mode==="register" && role==="user" && <Field testId="auth-confirm" label="Confirm password" type="password" value={f.confirm} onChange={e=>set("confirm",e.target.value)} error={errs.confirm} placeholder="Re-enter password"/>}
        </div>
        <button data-testid="auth-submit" onClick={submit} disabled={busy} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white py-2.5 rounded-lg mt-5 font-medium">{busy ? "Please wait…" : (mode==="login"?"Sign in":"Create account")}</button>
        {role==="user" && <p className="text-sm text-center text-slate-500 mt-4">{mode==="login"?"New here? ":"Already have an account? "}<button data-testid="auth-toggle-mode" onClick={()=>{setMode(mode==="login"?"register":"login"); setErrs({});}} className="text-indigo-600 font-medium">{mode==="login"?"Create an account":"Sign in"}</button></p>}
        <div className="mt-5 pt-4 border-t text-xs text-slate-500"><p className="font-medium mb-1">Demo credentials:</p>{role==="admin" ? <p>Admin → <code className="bg-slate-100 px-1">admin@nova.com</code> / <code className="bg-slate-100 px-1">admin123</code></p> : <p>Register a new account to get started.</p>}</div>
      </div>
    </div>
  );
}

/* ---------------- account ---------------- */
function Account({ go }) {
  const { currentUser, token } = useContext(Store);
  const [orders, setOrders] = useState(null);
  const [err, setErr] = useState(null);
  useEffect(() => {
    if (!currentUser) { go("auth"); return; }
    api("/orders/mine", { token }).then(d=>setOrders(d.orders)).catch(e=>setErr(e.message));
  }, []);
  if (!currentUser) return null;
  return (
    <div data-testid="page-account" className="max-w-3xl mx-auto px-4 py-8 fade">
      <h2 className="text-2xl font-bold mb-1">My Account</h2>
      <p className="text-slate-500 mb-6">{currentUser.name} · {currentUser.email} <span className="text-xs bg-slate-100 px-2 py-0.5 rounded ml-1">{currentUser.role}</span></p>
      <h3 className="font-semibold mb-3">Order history</h3>
      {err ? <ErrorBox msg={err}/> : orders===null ? <Spinner/> : orders.length===0 ? <p className="text-slate-400 text-sm">No orders yet. <button onClick={()=>go("shop")} className="text-indigo-600 underline">Start shopping</button></p> : (
        <div data-testid="account-orders" className="space-y-3">{orders.map(o=>(<div key={o.id} data-testid="account-order-row" data-order-id={o.id} className="bg-white border rounded-lg p-4"><div className="flex justify-between"><span className="font-medium">Order #{o.id}</span><span className="font-bold">{money(o.total)}</span></div><p className="text-xs text-slate-500">{new Date(o.createdAt).toLocaleString()} · {o.status}</p><p className="text-sm text-slate-600 mt-1">{o.items.map(i=>i.name+" ×"+i.qty).join(", ")}</p></div>))}</div>
      )}
    </div>
  );
}

/* ---------------- shop (fetches products) ---------------- */
function Shop({ go, setProduct, query }) {
  const { addToCart, wishlist, toggleWish } = useContext(Store);
  const [products, setProducts] = useState(null);
  const [err, setErr] = useState(null);
  const [cat, setCat] = useState("All");
  const [sort, setSort] = useState("featured");
  const [maxPrice, setMaxPrice] = useState(250);
  const fetchProducts = useCallback(() => { setErr(null); setProducts(null); api("/products").then(d=>setProducts(d.products)).catch(e=>setErr(e.message)); }, []);
  useEffect(() => { fetchProducts(); }, [fetchProducts]);

  if (err) return <ErrorBox msg={err} onRetry={fetchProducts}/>;
  if (products===null) return <Spinner label="Loading products…"/>;

  const cats = ["All", ...Array.from(new Set(products.map(p=>p.category).filter(Boolean)))];
  const featured = products.filter(p=>p.featured).slice(0,3);
  let filtered = products.filter(p => (cat==="All"||p.category===cat) && p.price<=maxPrice && p.name.toLowerCase().includes((query||"").toLowerCase()));
  if (sort==="low") filtered=[...filtered].sort((a,b)=>a.price-b.price);
  if (sort==="high") filtered=[...filtered].sort((a,b)=>b.price-a.price);
  if (sort==="rating") filtered=[...filtered].sort((a,b)=>b.rating-a.rating);
  if (sort==="featured") filtered=[...filtered].sort((a,b)=>(b.featured?1:0)-(a.featured?1:0));
  const openProduct = (p) => { setProduct(p.id); go("product"); };

  return (
    <div data-testid="page-shop" className="max-w-6xl mx-auto px-4 py-6">
      <div className="relative rounded-2xl overflow-hidden mb-8 bg-gradient-to-r from-indigo-600 to-violet-600 text-white p-8 md:p-12">
        <h1 className="text-3xl md:text-4xl font-bold max-w-md">Upgrade your everyday essentials</h1>
        <p className="mt-3 opacity-90 max-w-md">Thousands of quality products, fast delivery, and hassle-free returns.</p>
        <button onClick={()=>document.getElementById("grid").scrollIntoView({behavior:"smooth"})} className="mt-5 bg-white text-indigo-700 font-semibold px-5 py-2.5 rounded-lg">Shop now</button>
      </div>
      {featured.length>0 && !query && (<div className="mb-10"><h2 className="text-lg font-bold mb-4">⭐ Featured</h2><div className="grid sm:grid-cols-3 gap-4">{featured.map(p=>(<button key={p.id} onClick={()=>openProduct(p)} className="text-left bg-white border rounded-xl overflow-hidden hover:shadow-md transition"><img src={p.image} className="h-36 w-full object-cover"/><div className="p-3"><p className="font-medium text-sm line-clamp-2">{p.name}</p><p className="font-bold mt-1">{money(p.price)}</p></div></button>))}</div></div>)}
      <div id="grid" className="flex flex-col md:flex-row gap-6">
        <aside className="md:w-56 shrink-0 space-y-5">
          <div><h3 className="font-semibold text-sm mb-2">Category</h3><div className="space-y-1">{cats.map(c=>(<button key={c} data-testid={"filter-category-"+c} onClick={()=>setCat(c)} className={"block w-full text-left px-3 py-1.5 rounded-lg text-sm "+(cat===c?"bg-indigo-600 text-white":"hover:bg-slate-100")}>{c}</button>))}</div></div>
          <div><h3 className="font-semibold text-sm mb-2">Max price: {money(maxPrice)}</h3><input data-testid="filter-max-price" type="range" min="10" max="250" value={maxPrice} onChange={e=>setMaxPrice(+e.target.value)} className="w-full accent-indigo-600"/></div>
        </aside>
        <div className="flex-1">
          <div className="flex items-center justify-between mb-4"><p data-testid="product-count" className="text-sm text-slate-500">{filtered.length} products</p><select data-testid="sort-select" value={sort} onChange={e=>setSort(e.target.value)} className="border rounded-lg px-3 py-1.5 text-sm"><option value="featured">Featured</option><option value="low">Price: Low to High</option><option value="high">Price: High to Low</option><option value="rating">Top Rated</option></select></div>
          <div data-testid="product-grid" className="grid grid-cols-2 lg:grid-cols-3 gap-4">{filtered.map(p=>(
            <div key={p.id} data-testid="product-card" data-product-id={p.id} data-product-name={p.name} data-product-price={p.price} className="bg-white rounded-xl border overflow-hidden flex flex-col group fade">
              <div className="relative"><img data-testid="product-card-image" src={p.image} onClick={()=>openProduct(p)} className="h-40 w-full object-cover cursor-pointer bg-slate-100"/>{p.oldPrice && <span className="absolute top-2 left-2 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded">SALE</span>}<button data-testid="product-card-wish" onClick={()=>toggleWish(p)} className={"absolute top-2 right-2 w-8 h-8 rounded-full bg-white/90 flex items-center justify-center "+(wishlist.includes(p.id)?"text-rose-500":"text-slate-400")}>♥</button></div>

        </div>
      </div>
    </div>
  );
}

/* ---------------- cart + checkout (posts order to API) ---------------- */
function Cart({ go }) {
  const { cart, setCart, toast, currentUser, token } = useContext(Store);
  const [step, setStep] = useState("cart");
  const [info, setInfo] = useState({ name:currentUser?.name||"", email:currentUser?.email||"", phone:"", address:"", city:"", zip:"", payment:"card" });
  const [card, setCard] = useState({ number:"", name:"", expiry:"", cvc:"" });
  const [ierr, setIerr] = useState({});
  const [cerr, setCerr] = useState({});
  const [coupon, setCoupon] = useState("");
  const [applied, setApplied] = useState(null);
  const [order, setOrder] = useState(null);
  const [busy, setBusy] = useState(false);
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discount = applied ? (applied.type==="pct"?subtotal*applied.val/100:applied.val) : 0;
  const shipping = subtotal>75||subtotal===0 ? 0 : 6.99;
  const tax = (subtotal-discount)*0.08;
  const total = Math.max(0, subtotal-discount+shipping+tax);
  const setQty = (id,q)=> setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,q)}:i));
  const remove = (id)=> setCart(c=>c.filter(i=>i.id!==id));
  const applyCoupon = () => { const cs={SAVE10:{type:"pct",val:10,label:"10% off"},WELCOME5:{type:"flat",val:5,label:"$5 off"}}; const c=cs[coupon.toUpperCase()]; if(c){setApplied(c); toast("Coupon applied: "+c.label);} else {toast("Invalid coupon code"); setApplied(null);} };
  const brand = cardBrand(card.number);
  const validateInfo = () => { const e={ name:V.required(info.name), email:V.email(info.email), phone:V.phone(info.phone), address:V.required(info.address), city:V.required(info.city), zip:V.zip(info.zip) }; Object.keys(e).forEach(k=>{if(!e[k])delete e[k];}); setIerr(e); return Object.keys(e).length===0; };

  const placeOrder = async () => {
    if (!validateInfo()) { toast("Please fix the highlighted fields"); return; }
    if (info.payment==="card") { const ce=validateCard(card); setCerr(ce); if(Object.keys(ce).length){ toast("Check your card details"); return; } }
    setBusy(true);
    try {
      const { order } = await api("/orders", { method:"POST", body:{
        userId: currentUser?.id || null,
        customer: { name:info.name, email:info.email, phone:info.phone, address:info.address, city:info.city, zip:info.zip },
        items: cart.map(i=>({ id:i.id, qty:i.qty })),
        coupon: applied ? coupon : null,
        payment: info.payment,
        cardLast4: info.payment==="card" ? card.number.replace(/\s/g,"").slice(-4) : null,
      }});
      setCart([]); setOrder(order); setStep("done");
    } catch (err) { toast(err.message); }
    finally { setBusy(false); }
  };

  if (step==="done" && order) return (<div data-testid="order-confirmation" data-order-id={order.id} className="max-w-xl mx-auto px-4 py-16 text-center fade"><div className="text-6xl">🎉</div><h2 className="text-2xl font-bold mt-4">Thank you for your order!</h2><p className="text-slate-500 mt-2">Order <b data-testid="confirmation-order-id">#{order.id}</b> confirmed · <span data-testid="confirmation-total">{money(order.total)}</span></p><p className="text-sm text-slate-400 mt-1">Estimated delivery: 3–5 business days</p><button data-testid="confirmation-continue" onClick={()=>go("shop")} className="mt-6 bg-indigo-600 text-white px-6 py-2.5 rounded-lg">Continue shopping</button></div>);
  if (cart.length===0) return (<div data-testid="cart-empty" className="max-w-4xl mx-auto px-4 py-16 text-center"><div className="text-5xl">🛒</div><p className="text-slate-500 mt-4">Your cart is empty.</p><button data-testid="cart-empty-shop" onClick={()=>go("shop")} className="mt-4 bg-indigo-600 text-white px-5 py-2.5 rounded-lg">Start shopping</button></div>);

  const Summary = () => (
    <div className="bg-white border rounded-xl p-5 h-fit"><h3 className="font-semibold mb-3">Order summary</h3>
      <div className="space-y-1 text-sm"><Row testId="summary-subtotal" l="Subtotal" v={money(subtotal)}/>{discount>0 && <Row testId="summary-discount" l="Discount" v={"−"+money(discount)} green/>}<Row testId="summary-shipping" l="Shipping" v={shipping===0?"Free":money(shipping)}/><Row testId="summary-tax" l="Tax (8%)" v={money(tax)}/></div>
      <div className="flex justify-between mt-3 pt-3 border-t font-bold text-lg"><span>Total</span><span data-testid="summary-total">{money(total)}</span></div>
      {step==="cart" && <div className="flex gap-2 mt-4"><input data-testid="coupon-input" value={coupon} onChange={e=>setCoupon(e.target.value)} placeholder="Coupon code" className="flex-1 border rounded px-3 py-2 text-sm"/><button data-testid="coupon-apply" onClick={applyCoupon} className="bg-slate-800 text-white text-sm px-3 rounded">Apply</button></div>}
      <p className="text-xs text-slate-400 mt-2">Try: SAVE10 or WELCOME5. Final total is calculated by the server.</p>
    </div>
  );
  return (
    <div data-testid={step==="cart"?"page-cart":"page-checkout"} className="max-w-5xl mx-auto px-4 py-8">
      <div className="flex items-center gap-2 mb-6 text-sm"><span className={step==="cart"?"font-bold text-indigo-700":"text-slate-400"}>1. Cart</span><span className="text-slate-300">→</span><span className={step==="checkout"?"font-bold text-indigo-700":"text-slate-400"}>2. Checkout</span></div>
      {step==="cart" ? (
        <div className="grid md:grid-cols-3 gap-6">
          <div data-testid="cart-items" className="md:col-span-2 space-y-3">{cart.map(i=>(<div key={i.id} data-testid="cart-item" data-product-id={i.id} data-product-name={i.name} className="bg-white border rounded-lg p-3 flex items-center gap-3"><img src={i.image} className="w-16 h-16 object-cover rounded bg-slate-100"/><div className="flex-1"><p data-testid="cart-item-name" className="font-medium text-sm">{i.name}</p><p className="text-sm text-slate-500">{money(i.price)}</p></div><div className="flex items-center border rounded"><button data-testid="cart-item-decrease" onClick={()=>setQty(i.id,i.qty-1)} className="px-2 py-1">−</button><span data-testid="cart-item-qty" className="px-3 text-sm">{i.qty}</span><button data-testid="cart-item-increase" onClick={()=>setQty(i.id,i.qty+1)} className="px-2 py-1">+</button></div><span data-testid="cart-item-subtotal" className="w-20 text-right font-semibold text-sm">{money(i.price*i.qty)}</span><button data-testid="cart-item-remove" onClick={()=>remove(i.id)} className="text-rose-500 text-lg px-1">×</button></div>))}</div>
          <div className="space-y-3"><Summary/><button data-testid="proceed-to-checkout" onClick={()=>setStep("checkout")} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium">Proceed to checkout</button></div>
        </div>
      ) : (
        <div className="grid md:grid-cols-3 gap-6">
          <div className="md:col-span-2 space-y-6">
            <div className="bg-white border rounded-xl p-5"><h3 className="font-semibold mb-4">Shipping details</h3>
              <div className="grid grid-cols-2 gap-3">
                <div className="col-span-2"><Field testId="checkout-name" label="Full name" value={info.name} onChange={e=>setInfo({...info,name:e.target.value})} error={ierr.name}/></div>
                <Field testId="checkout-email" label="Email" value={info.email} onChange={e=>setInfo({...info,email:e.target.value})} error={ierr.email}/>
                <Field testId="checkout-phone" label="Phone" value={info.phone} onChange={e=>setInfo({...info,phone:e.target.value})} error={ierr.phone}/>
                <div className="col-span-2"><Field testId="checkout-address" label="Address" value={info.address} onChange={e=>setInfo({...info,address:e.target.value})} error={ierr.address}/></div>
                <Field testId="checkout-city" label="City" value={info.city} onChange={e=>setInfo({...info,city:e.target.value})} error={ierr.city}/>
                <Field testId="checkout-zip" label="ZIP / Postal" value={info.zip} onChange={e=>setInfo({...info,zip:e.target.value})} error={ierr.zip}/>
              </div>
            </div>
            <div className="bg-white border rounded-xl p-5"><h3 className="font-semibold mb-3">Payment method</h3>
              <div className="space-y-2">{[["card","💳 Credit / Debit Card"],["paypal","🅿️ PayPal"],["cod","💵 Cash on Delivery"]].map(([v,l])=>(<label key={v} data-testid={"payment-option-"+v} className={"flex items-center gap-2 border rounded-lg px-3 py-2 cursor-pointer text-sm "+(info.payment===v?"border-indigo-500 bg-indigo-50":"")}><input data-testid={"payment-radio-"+v} type="radio" checked={info.payment===v} onChange={()=>setInfo({...info,payment:v})}/>{l}</label>))}</div>
              {info.payment==="card" && (<div className="mt-4 space-y-3 border-t pt-4">
                <div className="relative"><Field testId="card-number" label="Card number" value={card.number} onChange={e=>{setCard({...card,number:formatCardNumber(e.target.value)}); setCerr(c=>({...c,number:undefined}));}} error={cerr.number} placeholder="1234 5678 9012 3456" inputMode="numeric"/>{brand && <span className="absolute right-3 top-7 text-xs bg-slate-100 px-2 py-0.5 rounded">{brand}</span>}</div>
                <Field testId="card-name" label="Name on card" value={card.name} onChange={e=>{setCard({...card,name:e.target.value}); setCerr(c=>({...c,name:undefined}));}} error={cerr.name} placeholder="JANE DOE"/>
                <div className="grid grid-cols-2 gap-3"><Field testId="card-expiry" label="Expiry (MM/YY)" value={card.expiry} onChange={e=>{setCard({...card,expiry:formatExpiry(e.target.value)}); setCerr(c=>({...c,expiry:undefined}));}} error={cerr.expiry} placeholder="12/28" inputMode="numeric"/><Field testId="card-cvc" label="CVC" value={card.cvc} onChange={e=>{setCard({...card,cvc:e.target.value.replace(/\D/g,"").slice(0,4)}); setCerr(c=>({...c,cvc:undefined}));}} error={cerr.cvc} placeholder={brand==="Amex"?"4 digits":"3 digits"} inputMode="numeric"/></div>
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800"><p className="font-semibold mb-1">🧪 Test cards (safe — not real accounts):</p>{TEST_CARDS.map(c=>(<button key={c.number} data-testid={"test-card-"+c.brand.toLowerCase().replace(/\s+/g,"-")} onClick={()=>{setCard({number:c.number,name:"TEST USER",expiry:c.exp,cvc:c.cvc}); setCerr({});}} className="block w-full text-left hover:bg-amber-100 rounded px-1 py-0.5"><b>{c.brand}:</b> {c.number} · CVC {c.cvc} · {c.exp} <span className="text-amber-600">(click to fill)</span></button>))}</div>
              </div>)}
            </div>
            <button data-testid="back-to-cart" onClick={()=>setStep("cart")} className="text-sm text-slate-500">← Back to cart</button>
          </div>
          <div className="space-y-3"><Summary/><button data-testid="place-order" onClick={placeOrder} disabled={busy} className="w-full bg-indigo-600 disabled:bg-slate-300 text-white py-3 rounded-lg font-medium">{busy?"Placing order…":"Place order · "+money(total)}</button></div>
        </div>
      )}
    </div>
  );
}

function OrdersAdmin() {
  const { token, toast } = useContext(Store);
  const [orders, setOrders] = useState(null); const [err, setErr] = useState(null);
  const [filter, setFilter] = useState("All"); const [q, setQ] = useState("");
  const statuses = ["Pending","Processing","Shipped","Delivered","Cancelled"];
  const fetchOrders = useCallback(()=>{ setErr(null); api("/orders",{token}).then(d=>setOrders(d.orders)).catch(e=>setErr(e.message)); },[token]);
  useEffect(()=>{ fetchOrders(); },[fetchOrders]);
  const setStatus = async (id,status)=>{ try{ await api("/orders/"+id+"/status",{method:"PATCH",body:{status},token}); setOrders(os=>os.map(o=>o.id===id?{...o,status}:o)); toast("Status updated"); }catch(e){ toast(e.message); } };
  const del = async (id)=>{ if(!confirm("Delete this order?"))return; try{ await api("/orders/"+id,{method:"DELETE",token}); setOrders(os=>os.filter(o=>o.id!==id)); toast("Order deleted"); }catch(e){ toast(e.message); } };
  if (err) return <ErrorBox msg={err} onRetry={fetchOrders}/>;
  if (orders===null) return <Spinner/>;
  const shown = orders.filter(o=>(filter==="All"||o.status===filter) && (o.customer.name.toLowerCase().includes(q.toLowerCase())||String(o.id).includes(q)));
  const badge = { Pending:"bg-amber-100 text-amber-700", Processing:"bg-blue-100 text-blue-700", Shipped:"bg-violet-100 text-violet-700", Delivered:"bg-green-100 text-green-700", Cancelled:"bg-rose-100 text-rose-700" };
  return (
    <div>
      <div className="flex flex-wrap gap-3 mb-4"><input data-testid="orders-search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by name or order #" className="border rounded-lg px-3 py-2 text-sm flex-1 min-w-[200px]"/><select data-testid="orders-status-filter" value={filter} onChange={e=>setFilter(e.target.value)} className="border rounded-lg px-3 py-2 text-sm"><option>All</option>{statuses.map(st=><option key={st}>{st}</option>)}</select></div>
      {shown.length===0 ? <p data-testid="orders-empty" className="text-slate-400 py-8 text-center">No orders found.</p> : (<div data-testid="orders-list" className="space-y-3">{shown.map(o=>(
        <div key={o.id} data-testid="order-row" data-order-id={o.id} data-order-status={o.status} className="bg-white border rounded-xl p-4">
          <div className="flex flex-wrap justify-between gap-3">
            <div><div className="flex items-center gap-2"><p data-testid="order-row-id" className="font-semibold">Order #{o.id}</p><span data-testid="order-row-status" className={"text-xs px-2 py-0.5 rounded "+badge[o.status]}>{o.status}</span></div><p className="text-xs text-slate-500 mt-0.5">{new Date(o.createdAt).toLocaleString()}</p><p className="text-sm mt-1">{o.customer.name} · {o.customer.email} {o.customer.phone&&"· "+o.customer.phone}</p><p className="text-xs text-slate-500">{o.customer.address}, {o.customer.city} {o.customer.zip}</p><p className="text-xs text-slate-500 mt-0.5">Payment: {o.payment}{o.cardLast4?" ····"+o.cardLast4:""}</p></div>
            <div className="text-right"><p data-testid="order-row-total" className="font-bold text-lg">{money(o.total)}</p><select data-testid="order-row-status-select" value={o.status} onChange={e=>setStatus(o.id,e.target.value)} className="border rounded px-2 py-1 text-sm mt-1">{statuses.map(st=><option key={st}>{st}</option>)}</select><button data-testid="order-row-delete" onClick={()=>del(o.id)} className="block text-rose-500 text-xs mt-2 ml-auto">Delete</button></div>
          </div>
          <div className="mt-3 pt-3 border-t text-sm text-slate-600 flex flex-wrap gap-x-4 gap-y-1">{o.items.map(i=><span key={i.id}>{i.name} ×{i.qty} <span className="text-slate-400">({money(i.price*i.qty)})</span></span>)}</div>
        </div>
      ))}</div>)}
    </div>
  );
}

function CustomersAdmin() {
  const { token } = useContext(Store);
  const [tab2, setTab2] = useState("list");
  return (
    <div>
      <div className="flex gap-2 mb-4"><button data-testid="customers-tab-list" onClick={()=>setTab2("list")} className={"px-3 py-1.5 rounded-lg text-sm "+(tab2==="list"?"bg-slate-800 text-white":"bg-white border")}>Customer list</button><button data-testid="customers-tab-add" onClick={()=>setTab2("add")} className={"px-3 py-1.5 rounded-lg text-sm "+(tab2==="add"?"bg-slate-800 text-white":"bg-white border")}>➕ Add customer</button></div>
      {tab2==="list" ? <CustomerList token={token}/> : <AddCustomer token={token} onDone={()=>setTab2("list")}/>}
    </div>
  );
}
function CustomerList({ token }) {
  const [customers, setCustomers] = useState(null); const [err, setErr] = useState(null);
  const fetchC = useCallback(()=>{ setErr(null); api("/customers",{token}).then(d=>setCustomers(d.customers)).catch(e=>setErr(e.message)); },[token]);
  useEffect(()=>{ fetchC(); },[fetchC]);
  if (err) return <ErrorBox msg={err} onRetry={fetchC}/>;
  if (customers===null) return <Spinner/>;
  if (customers.length===0) return <p data-testid="customers-empty" className="text-slate-400">No registered customers yet.</p>;
  return <div data-testid="customers-list" className="space-y-2">{customers.map(u=>(<div key={u.id} data-testid="customer-row" data-customer-id={u.id} className="bg-white border rounded-lg p-4 flex justify-between items-center"><div><p data-testid="customer-row-name" className="font-medium">{u.name}</p><p data-testid="customer-row-email" className="text-sm text-slate-500">{u.email}</p></div><div className="text-right text-sm"><p data-testid="customer-row-orders">{u.orders} orders</p><p className="text-slate-500"><span data-testid="customer-row-spent">{money(u.totalSpent)}</span> spent</p></div></div>))}</div>;
}
function AddCustomer({ token, onDone }) {
  const { toast } = useContext(Store);
  const [f, setF] = useState({ name:"", email:"", password:"", role:"user" });
  const [errs, setErrs] = useState({}); const [busy, setBusy] = useState(false);
  const set = (k,v)=>{ setF({...f,[k]:v}); setErrs(e=>({...e,[k]:undefined})); };
  const submit = async () => {
    const e = { name:V.required(f.name), email:V.email(f.email), password:V.min(6)(f.password) };
    Object.keys(e).forEach(k=>{ if(!e[k]) delete e[k]; }); setErrs(e);
    if (Object.keys(e).length) return;
    setBusy(true);
    try { await api("/customers",{method:"POST",body:f,token}); toast("Customer added"); onDone(); }
    catch (err) { setErrs({ email: err.message }); }
    finally { setBusy(false); }
  };
  return (
    <div className="bg-white border rounded-xl p-5 max-w-md">
      <h3 className="font-semibold mb-3">Add a customer</h3>
      <div className="space-y-2">
        <Field testId="add-customer-name" label="Name" value={f.name} onChange={e=>set("name",e.target.value)} error={errs.name}/>
        <Field testId="add-customer-email" label="Email" value={f.email} onChange={e=>set("email",e.target.value)} error={errs.email}/>
        <Field testId="add-customer-password" label="Password" type="password" value={f.password} onChange={e=>set("password",e.target.value)} error={errs.password}/>
        <div><label className="block text-xs font-medium text-slate-600 mb-1">Role</label><select data-testid="add-customer-role" value={f.role} onChange={e=>set("role",e.target.value)} className="w-full border rounded px-3 py-2 text-sm"><option value="user">Customer</option><option value="admin">Admin</option></select></div>
      </div>
      <button data-testid="add-customer-submit" onClick={submit} disabled={busy} className="w-full bg-indigo-600 disabled:bg-slate-300 text-white py-2.5 rounded-lg mt-3">{busy?"Adding…":"Add customer"}</button>
    </div>
  );
}

function CatalogAdmin() {
  const { token, toast } = useContext(Store);
  const [products, setProducts] = useState(null); const [err, setErr] = useState(null);
  const blank = { name:"", price:"", oldPrice:"", category:"", stock:"", image:"", description:"", featured:false };
  const [form, setForm] = useState(blank); const [editId, setEditId] = useState(null);
  const [q, setQ] = useState(""); const [errs, setErrs] = useState({}); const [busy, setBusy] = useState(false);
  const fetchP = useCallback(()=>{ setErr(null); api("/products",{token}).then(d=>setProducts(d.products)).catch(e=>setErr(e.message)); },[token]);
  useEffect(()=>{ fetchP(); },[fetchP]);
  const submit = async () => {
    const e = { name:V.required(form.name) };
    if (!form.price || isNaN(parseFloat(form.price)) || parseFloat(form.price)<=0) e.price="Enter a valid price";
    if (form.stock!=="" && (isNaN(parseInt(form.stock)) || parseInt(form.stock)<0)) e.stock="Stock must be 0 or more";
    Object.keys(e).forEach(k=>{ if(!e[k]) delete e[k]; }); setErrs(e);
    if (Object.keys(e).length) return;
    setBusy(true);
    const body = { name:form.name, price:parseFloat(form.price), oldPrice:form.oldPrice?parseFloat(form.oldPrice):null, category:form.category, stock:parseInt(form.stock)||0, image:form.image, description:form.description, featured:form.featured };
    try {
      if (editId) { const { product } = await api("/products/"+editId,{method:"PUT",body,token}); setProducts(ps=>ps.map(p=>p.id===editId?product:p)); toast("Product updated"); }
      else { const { product } = await api("/products",{method:"POST",body,token}); setProducts(ps=>[product,...ps]); toast("Product added"); }
      setForm(blank); setEditId(null); setErrs({});
    } catch (err) { toast(err.message); }
    finally { setBusy(false); }
  };
  const edit = (p)=>{ setForm({ name:p.name, price:p.price, oldPrice:p.oldPrice||"", category:p.category||"", stock:p.stock, image:p.image||"", description:p.description||"", featured:p.featured }); setEditId(p.id); setErrs({}); window.scrollTo(0,0); };
  const del = async (id)=>{ if(!confirm("Delete this product?"))return; try{ await api("/products/"+id,{method:"DELETE",token}); setProducts(ps=>ps.filter(p=>p.id!==id)); toast("Product deleted"); }catch(e){ toast(e.message); } };
  if (err) return <ErrorBox msg={err} onRetry={fetchP}/>;
  if (products===null) return <Spinner/>;
  const shown = products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div className="grid md:grid-cols-3 gap-6">
      <div className="bg-white border rounded-xl p-5 h-fit md:sticky md:top-24"><h3 className="font-semibold mb-3">{editId?"✏️ Edit product":"➕ Add product"}</h3>
        <div className="space-y-2">
          <Field testId="catalog-name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} error={errs.name} placeholder="Name *"/>
          <div className="grid grid-cols-2 gap-2"><Field testId="catalog-price" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} error={errs.price} type="number" placeholder="Price *"/><Field testId="catalog-old-price" value={form.oldPrice} onChange={e=>setForm({...form,oldPrice:e.target.value})} type="number" placeholder="Old price"/></div>
          <div className="grid grid-cols-2 gap-2"><Field testId="catalog-category" value={form.category} onChange={e=>setForm({...form,category:e.target.value})} placeholder="Category"/><Field testId="catalog-stock" value={form.stock} onChange={e=>setForm({...form,stock:e.target.value})} error={errs.stock} type="number" placeholder="Stock"/></div>
          <Field testId="catalog-image" value={form.image} onChange={e=>setForm({...form,image:e.target.value})} placeholder="Image URL"/>
          <textarea data-testid="catalog-description" placeholder="Description" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} className="w-full border rounded px-3 py-2 text-sm" rows="2"/>
          <label className="flex items-center gap-2 text-sm"><input data-testid="catalog-featured" type="checkbox" checked={form.featured} onChange={e=>setForm({...form,featured:e.target.checked})}/> Featured product</label>
        </div>
        <button data-testid="catalog-submit" onClick={submit} disabled={busy} className="w-full bg-indigo-600 disabled:bg-slate-300 text-white py-2.5 rounded-lg mt-3">{busy?"Saving…":(editId?"Save changes":"Add product")}</button>
        {editId && <button data-testid="catalog-cancel" onClick={()=>{setForm(blank);setEditId(null);setErrs({});}} className="w-full text-sm text-slate-500 mt-2">Cancel</button>}
      </div>
      <div className="md:col-span-2"><input data-testid="catalog-search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search products…" className="w-full border rounded-lg px-3 py-2 text-sm mb-3"/>
        <div data-testid="catalog-list" className="space-y-2">{shown.map(p=>(<div key={p.id} data-testid="catalog-row" data-product-id={p.id} data-product-name={p.name} className="bg-white border rounded-lg p-3 flex items-center gap-3"><img src={p.image} className="w-14 h-14 object-cover rounded bg-slate-100"/><div className="flex-1 min-w-0"><p data-testid="catalog-row-name" className="font-medium truncate">{p.name} {p.featured&&<span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded ml-1">Featured</span>}</p><p className="text-sm text-slate-500">{money(p.price)} · {p.category||"—"} · Stock: <span className={p.stock<20?"text-amber-600 font-medium":""}>{p.stock}</span></p></div><button data-testid="catalog-row-edit" onClick={()=>edit(p)} className="text-indigo-600 text-sm">Edit</button><button data-testid="catalog-row-delete" onClick={()=>del(p.id)} className="text-rose-500 text-sm">Delete</button></div>))}</div>
      </div>
    </div>
  );
}

/* ---------------- settings (API URL) ---------------- */
function ApiBadge() {
  const [open, setOpen] = useState(false);
  const [url, setUrl] = useState(API_BASE);
  return (
    <div className="fixed bottom-5 left-5 z-50">
      {open ? (
        <div className="bg-white border rounded-xl p-4 shadow-lg w-80 fade">
          <p className="text-xs font-semibold mb-2">API server URL</p>
          <input data-testid="api-url-input" value={url} onChange={e=>setUrl(e.target.value)} className="w-full border rounded px-3 py-2 text-sm mb-2"/>
          <div className="flex gap-2"><button data-testid="api-url-save" onClick={()=>{ localStorage.setItem("ns_api_base",url); location.reload(); }} className="flex-1 bg-indigo-600 text-white text-sm py-2 rounded-lg">Save & reload</button><button onClick={()=>setOpen(false)} className="text-slate-500 text-sm px-3">Close</button></div>
          <p className="text-[11px] text-slate-400 mt-2">Point this at your deployed API when hosting.</p>
        </div>
      ) : (
        <button data-testid="api-badge" onClick={()=>setOpen(true)} className="bg-white border rounded-full px-3 py-1.5 shadow text-xs text-slate-500 hover:text-slate-700">⚙️ API: {API_BASE.replace(/^https?:\/\//,"")}</button>
      )}
    </div>
  );
}

function App() {
  const [page, setPage] = useState("shop");
  const [productId, setProductId] = useState(null);
  const [query, setQuery] = useState("");
  const go = (p) => { setPage(p); window.scrollTo(0,0); };
  return (
    <StoreProvider>
      <Nav page={page} go={go} query={query} setQuery={setQuery}/>
      {page==="shop" && <Shop go={go} setProduct={setProductId} query={query}/>}
      {page==="product" && <ProductPage id={productId} go={go}/>}
      {page==="cart" && <Cart go={go}/>}
      {page==="wishlist" && <Wishlist go={go}/>}
      {page==="auth" && <AuthPage go={go}/>}
      {page==="account" && <Account go={go}/>}
      {page==="admin" && <Admin go={go}/>}
      <footer className="border-t bg-white mt-10"><div className="max-w-6xl mx-auto px-4 py-8 grid sm:grid-cols-3 gap-6 text-sm"><div><p className="font-bold text-indigo-700 text-lg">🛍️ Nova Store</p><p className="text-slate-500 mt-2">Quality products, fair prices, fast delivery.</p></div><div><p className="font-semibold mb-2">Help</p><ul className="text-slate-500 space-y-1"><li>Shipping & Returns</li><li>Track Order</li><li>Contact Us</li><li>FAQ</li></ul></div><div><p className="font-semibold mb-2">Newsletter</p><p className="text-slate-500 mb-2">Get 10% off your first order.</p><div className="flex gap-2"><input placeholder="Email" className="border rounded px-3 py-2 text-sm flex-1"/><button className="bg-indigo-600 text-white px-3 rounded text-sm">Join</button></div></div></div><div className="text-center text-xs text-slate-400 py-4 border-t">© 2026 Nova Store — connected to REST API.</div></footer>
      <Toasts/>
      <ApiBadge/>
    </StoreProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
